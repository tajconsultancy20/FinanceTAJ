<!DOCTYPE html>
<html>
<head>
  <title>PayTrack SaaS</title>
  <style>
    body { font-family: Arial; background:#0d0f14; color:white; padding:20px; }
    input, select, button { padding:10px; margin:5px; border-radius:5px; border:none; }
    button { background:#f0b429; cursor:pointer; }
    .card { background:#1e2230; padding:15px; margin:10px 0; border-radius:10px; }
    .summary { font-size:18px; margin:10px 0; }
  </style>
</head>
<body>

<h1>PayTrack SaaS</h1>

<!-- LOGIN -->
<div id="loginDiv">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <button onclick="logout()">Logout</button>
  <h2>Dashboard</h2>

  <div class="summary">
    Total: ₹<span id="total">0</span> |
    Paid: ₹<span id="paid">0</span> |
    Pending: ₹<span id="pending">0</span>
  </div>

  <div class="card">
    <h3>Add Invoice</h3>

    <input id="client" placeholder="Client Name"><br>
    <input id="vendor" placeholder="Vendor Name"><br>
    <input id="inv-num" placeholder="Invoice Number"><br>
    <input id="amount" type="number" placeholder="Amount"><br>
    <input type="date" id="due"><br>

    <select id="status">
      <option value="pending">Pending</option>
      <option value="paid">Paid</option>
    </select><br>

    <input type="file" id="file"><br>

    <button onclick="saveInvoice()">Save Invoice</button>
  </div>

  <div class="card">
    <h3>Invoices</h3>
    <ul id="list"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔴 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;

// LOGIN
window.login = async function() {
  try {
    await signInWithEmailAndPassword(auth,
      email.value,
      password.value
    );
  } catch (e) {
    alert(e.message);
  }
};

// LOGOUT
window.logout = async function() {
  await signOut(auth);
  location.reload();
};

// SESSION
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;

    loginDiv.style.display = "none";
    dashboard.style.display = "block";

    load();
  }
});

// SAVE INVOICE
window.saveInvoice = async function() {
  const file = document.getElementById("file").files[0];
  let url = "";

  if (file) {
    const storageRef = ref(storage, "invoices/" + file.name);
    await uploadBytes(storageRef, file);
    url = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db, "invoices"), {
    userId: currentUser.uid,
    client: client.value,
    vendor: vendor.value,
    num: document.getElementById("inv-num").value,
    amount: Number(amount.value),
    due: due.value,
    status: status.value,
    url
  });

  // clear fields
  client.value = "";
  vendor.value = "";
  document.getElementById("inv-num").value = "";
  amount.value = "";
  due.value = "";
  file.value = "";

  load();
};

// LOAD USER DATA
async function load() {
  const q = query(
    collection(db, "invoices"),
    where("userId", "==", currentUser.uid)
  );

  const snapshot = await getDocs(q);

  let total = 0, paid = 0, pending = 0;
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();

    total += d.amount;
    if (d.status === "paid") paid += d.amount;
    else pending += d.amount;

    const li = document.createElement("li");
    li.innerHTML = `
      <b>${d.client}</b> | ${d.vendor} | ${d.num} |
      ₹${d.amount} | Due: ${d.due} |
      <b>${d.status.toUpperCase()}</b>
      ${d.url ? `<a href="${d.url}" target="_blank">View</a>` : ""}
    `;

    list.appendChild(li);
  });

  totalSpan.innerText = total;
  paidSpan.innerText = paid;
  pendingSpan.innerText = pending;
}

// FIX IDs
const totalSpan = document.getElementById("total");
const paidSpan = document.getElementById("paid");
const pendingSpan = document.getElementById("pending");

</script>

</body>
</html>
