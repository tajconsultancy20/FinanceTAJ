<!DOCTYPE html>
<html>
<head>
<title>PayTrack SaaS Pro</title>
<style>
body {margin:0;font-family:Arial;background:#f5f6fa;}
.sidebar {width:220px;height:100vh;background:#1e2230;color:white;position:fixed;padding:20px;}
.content {margin-left:240px;padding:20px;}
.card {background:white;padding:15px;margin:10px 0;border-radius:10px;}
input,select,button {padding:10px;margin:5px;border-radius:5px;border:1px solid #ccc;}
button {background:#007bff;color:white;cursor:pointer;}
</style>
</head>

<body>

<div class="sidebar">
<h2>PayTrack</h2>
<button onclick="createCompany()">+ Company</button>
<select id="companySelect"></select>
</div>

<div class="content">

<div id="loginDiv">
<h2>Login</h2>
<input id="email"><br>
<input id="password" type="password"><br>
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
<button onclick="logout()">Logout</button>

<div class="card">
<h3>Reports</h3>
Total ₹<span id="total">0</span> |
Paid ₹<span id="paid">0</span> |
Pending ₹<span id="pending">0</span>
</div>

<div class="card">
<button onclick="exportCSV()">Export Excel</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

<div class="card">
<h3>Add Invoice</h3>
<input id="client" placeholder="Client"><br>
<input id="vendor" placeholder="Vendor"><br>
<input id="amount" type="number"><br>
<input type="date" id="due"><br>
<button onclick="saveInvoice()">Save</button>
</div>

<div class="card">
<ul id="list"></ul>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBctAYSnRDgmX_pBSGMCcQzr1uS0EjIaNs",
  authDomain: "finance-portal-f1f84.firebaseapp.com",
  projectId: "finance-portal-f1f84",
  storageBucket: "finance-portal-f1f84.firebasestorage.app",
  messagingSenderId: "454088803574",
  appId: "1:454088803574:web:550311aeed4e72122e18d7",
  measurementId: "G-ZRYW88JC65"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;
let currentCompany=null;
let invoicesData=[];

// LOGIN
window.login=async()=>{
 await signInWithEmailAndPassword(auth,email.value,password.value);
};

// LOGOUT
window.logout=async()=>{
 await signOut(auth);
 location.reload();
};

// SESSION
onAuthStateChanged(auth,async(user)=>{
 if(user){
   currentUser=user;
   loginDiv.style.display="none";
   dashboard.style.display="block";
   loadCompanies();
 }
});

// CREATE COMPANY
window.createCompany=async()=>{
 const name=prompt("Company Name");
 if(!name)return;

 await addDoc(collection(db,"companies"),{
   userId:currentUser.uid,
   name
 });

 loadCompanies();
};

// LOAD COMPANIES
async function loadCompanies(){
 const snap=await getDocs(query(collection(db,"companies"),where("userId","==",currentUser.uid)));

 companySelect.innerHTML="";
 snap.forEach(doc=>{
   const opt=document.createElement("option");
   opt.value=doc.id;
   opt.textContent=doc.data().name;
   companySelect.appendChild(opt);
 });

 currentCompany=companySelect.value;
 loadInvoices();
}

companySelect.onchange=()=>{
 currentCompany=companySelect.value;
 loadInvoices();
};

// SAVE INVOICE
window.saveInvoice=async()=>{
 await addDoc(collection(db,"invoices"),{
   userId:currentUser.uid,
   companyId:currentCompany,
   client:client.value,
   vendor:vendor.value,
   amount:Number(amount.value),
   due:due.value,
   status:"pending"
 });
 loadInvoices();
};

// LOAD INVOICES
async function loadInvoices(){
 const snap=await getDocs(query(collection(db,"invoices"),
 where("userId","==",currentUser.uid),
 where("companyId","==",currentCompany)));

 let total=0,paid=0,pending=0;
 invoicesData=[];
 list.innerHTML="";

 snap.forEach(doc=>{
   const d=doc.data();
   invoicesData.push(d);

   total+=d.amount;
   if(d.status==="paid") paid+=d.amount;
   else pending+=d.amount;

   const li=document.createElement("li");
   li.innerText=`${d.client} | ₹${d.amount}`;
   list.appendChild(li);
 });

 totalSpan.innerText=total;
 paidSpan.innerText=paid;
 pendingSpan.innerText=pending;
}

// EXPORT CSV
window.exportCSV=()=>{
 let csv="Client,Vendor,Amount,Due\n";
 invoicesData.forEach(d=>{
   csv+=`${d.client},${d.vendor},${d.amount},${d.due}\n`;
 });

 const blob=new Blob([csv]);
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="report.csv";
 a.click();
};

// EXPORT PDF (PRINT)
window.exportPDF=()=>{
 window.print();
};

const totalSpan=document.getElementById("total");
const paidSpan=document.getElementById("paid");
const pendingSpan=document.getElementById("pending");

</script>

</body>
</html>
